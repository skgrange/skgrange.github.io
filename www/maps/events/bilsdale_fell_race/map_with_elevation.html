<!DOCTYPE html>
<html>

<head>
  <title>Map with elevation and extras</title>
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
  <style type="text/css">
    table,
    td {
      border-collapse: collapse;
      border-style: solid;
      border-width: 1px;
      border-color: #e9e9e9;
      padding: 5px;
    }

    .evenrowcol {
      background-color: #f6f6f6;
    }
  </style>

  <!--Leaflet-->
  <link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.css" />
  <script type="text/javascript" src="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.js"></script>

  <!--Elevation widget-->
  <link rel="stylesheet" href="../../common_resources/elevation/leaflet.elevation-0.0.4.css" />
  <script src="http://d3js.org/d3.v3.min.js" charset="utf-8"></script>
  <script type="text/javascript" src="../../common_resources/elevation/leaflet.elevation-0.0.4.min.js"></script>

  <!--Custom markers-->
  <link href="http://netdna.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.css" rel="stylesheet">
  <link href="../../common_resources/font_awesome_icons/leaflet.awesome-markers.css" rel="stylesheet">
  <script src="../../common_resources/font_awesome_icons/leaflet.awesome-markers.js"></script>

  <!--Distance markers and arrows-->
  <script src="../../common_resources/arrows_and_distance/L.LineUtil.PolylineDecorator.js"></script>
  <script src="../../common_resources/arrows_and_distance/L.RotatedMarker.js"></script>
  <script src="../../common_resources/arrows_and_distance/L.Symbol.js"></script>
  <script src="../../common_resources/arrows_and_distance/L.PolylineDecorator.js"></script>

  <link href="../../common_resources/arrows_and_distance/leaflet-distance-marker.css" rel="stylesheet">
  <script src="../../common_resources/arrows_and_distance/leaflet-distance-marker.js"></script>
  <script src="../../common_resources/arrows_and_distance/leaflet.geometryutil.js"></script>

</head>

<body>

  <div id="map"></div>

  <!--Load data, a geojson file with elevation dimension and a variable name-->
  <script src="./data/geojson_line_data.json"></script>

  <!--Helper functions-->
  <script src="../../common_resources/leaflet_base_layers.js"></script>
  <script src="../../common_resources/leaflet_functions.js"></script>
  
  <!--Start mapping script-->
  <script type="text/javascript">
  
    // Map tiles created in base layers script...

    // Find and apply boundary box for view
    var geojson_layer = L.geoJson(data_geojson_line);
    map.fitBounds(geojson_layer.getBounds());
    
    // Extract coordinates from geojson for arrows
    var array_coordinates = data_geojson_line.geometry.coordinates;
    
    // Allocate
    var array_coordinates_slice = [];
    
    for (var i = 0; i < array_coordinates.length; i++) {
      
      // Drop z dimension from coordinates
      array_coordinates_slice[i] = array_coordinates[i].slice(0, 2);
      
      // Switch order for polylines
      array_coordinates_slice[i].reverse();
      
    }
    
    // Add arrows to line, using string data here
    var arrows_on_line = arrows(
      array_coordinates_slice, 
      standard = false
    ).addTo(map);

    // Add elevation things
    var el = L.control.elevation({
      position: "bottomright",
      width: 800,
      height: 150
    });

    el.addTo(map);

    var gjl = L.geoJson(data_geojson_line, {
      style: {
        color: "red",
        opacity: 1
      },
      onEachFeature: el.addData.bind(el)
    }).addTo(map);

    // Start marker
    var marker_point_start = marker_start_geojson(
      data_geojson_line,
      name = "Bilsdale Fell Race",
      series = "",
      oragniser = "Esk Valley Fell Club",
      distance = 23,
      climb = 1300,
      fell_categories = "AL (hilly and long)",
      notes = "Only AL race in the North York Moors"
    ).addTo(map);

    // Finish marker
    var marker_point_end = marker_end_geojson(
      data_geojson_line,
      name = "Finish"
    ).addTo(map);

    // Set hill shading
    hill_shading.addTo(map);

    // Add some layer control
    var overlay_layers = {
      "Hill shading? (experimental)": hill_shading
    };

    // Only base layers for layer control used here
    L.control.layers(base_maps, overlay_layers).addTo(map);
    
  </script>
  
</body>
</html>
